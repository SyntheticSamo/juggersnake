<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juggernake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .game-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        canvas {
            border: 3px solid #00ff00;
            background-color: #0f1419;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .controls {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button {
            background: #00aa44;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
            box-shadow: 0 0 10px rgba(0, 170, 68, 0.5);
        }

        button:hover {
            background: #00dd55;
            box-shadow: 0 0 15px rgba(0, 221, 85, 0.7);
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .song-info {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 5px;
            display: none;
            min-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .song-info.active {
            display: block;
        }

        .sidebar-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .sidebar-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .milestone-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 10001;
            pointer-events: none;
            animation: comboAnimation 4s ease-in-out forwards;
        }

        .milestone-overlay.active {
            display: flex;
        }

        .milestone-overlay img {
            max-width: 80vw;
            max-height: 80vh;
            object-fit: contain;
            opacity: 0.9;
        }

        /* Fan fullscreen overlay (semi-transparent so board remains visible) */
        .fan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10002;
            background: rgba(0,0,0,0.35);
            pointer-events: none;
        }

        .fan-overlay.active {
            display: flex;
            animation: fanOverlayAnim 4s ease-in-out forwards;
        }

        .fan-overlay .fan-text {
            color: #FFD700;
            font-size: 72px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 30px rgba(255,215,0,0.8);
            opacity: 0.6; /* make more transparent */
        }

        @keyframes fanOverlayAnim {
            0% { opacity: 0; transform: scale(0.6); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1); }
        }

        .combo-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #FFD700;
            opacity: 0.95;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 100, 0, 0.6);
            pointer-events: none;
            animation: comboAnimation 4s ease-in-out forwards;
            z-index: 10000;
            display: none;
        }

        .combo-text.active {
            display: block;
        }

        @keyframes comboAnimation {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .song-cover {
            max-width: 150px;
            height: auto;
            border-radius: 5px;
            margin: 10px 0;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .combo-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #FFD700;

            z-index: 10000;
            display: none;
        }

        .combo-text.active {
            display: block;
        }

        @keyframes comboAnimation {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>

                    break;
                case 'ArrowLeft':
                    if (dx === 0) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { nextDx = 1; nextDy = 0; }
                    break;
            }
        });

        function startGame() {
            if (gameRunning && !gamePaused) return;
            
            // stop menu music when the game begins so it doesn't overlap
            document.getElementById('bgmMenu').pause();

            if (!gameRunning) {
                shuffleSongs();
                snake = [{ x: 5, y: 5 }];
                dx = 1;
                dy = 0;
                nextDx = 1;
                nextDy = 0;
                score = 0;
                applesEaten = 0;
                songsCollected = 0;
                collectedSongIndices.clear();
                applesEatenThisRound = 0;
                milestoneTriggered.clear(); // Reset milestone tracking
                updateScore();
                generateFood();

                console.log('Game started. Snake at:', snake[0], 'Food at:', food)
            }

            gameRunning = true;
            gamePaused = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = 'Pause';

            clearInterval(gameLoop);
            gameLoop = setInterval(update, 200);
        }

        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';

            if (gamePaused) {
                clearInterval(gameLoop);
                bgm.pause();
                // show menu music while paused
                document.getElementById('bgmMenu').play().catch(e => console.log('Menu resume prevented:', e));
            } else {
                gameLoop = setInterval(update, 200);
                bgm.play();
                // pause menu music when resuming
                document.getElementById('bgmMenu').pause();
            }
        }

        // Shuffled song list for this game
        let songSequence = [];
        let currentSongIndex = 0;

        function shuffleSongs() {
            songSequence = [...SONGS].sort(() => Math.random() - 0.5);
            currentSongIndex = 0;
        }

        function generateFood(depth = 0) {
            // Safety check to prevent infinite recursion if snake fills board
            if (depth > 50) {
                // If we can't find a spot after 50 tries, end the game
                endGame();
                return;
            }
            
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Pattern: 1 song-changing, 3 no-effect apples, repeat
            // Pattern position: (applesEatenThisRound % 4) gives us 0,1,2,3
            const patternPos = applesEatenThisRound % 4;
            food.changesMusic = (patternPos === 0); // Only when pos is 0 (every 4th apple)
            
            if (food.changesMusic) {
                // Get next song from shuffled sequence
                food.songIndex = SONGS.indexOf(songSequence[currentSongIndex]);
                
                // Move to next song, and restart sequence if we've eaten all songs
                currentSongIndex++;
                if (currentSongIndex >= songSequence.length) {
                    shuffleSongs(); // Reshuffle and loop infinitely
                }
            }
            // If it doesn't change music, keep the current songIndex (no change)

            // Ensure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood(depth + 1);
                    break;
                }
            }
        }

        function update() {
            // Update snake direction
            dx = nextDx;
            dy = nextDy;

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                applesEaten++;
                
                if (food.changesMusic) {
                    playSong(food.songIndex);
                    if (!collectedSongIndices.has(food.songIndex)) {
                        collectedSongIndices.add(food.songIndex);
                        songsCollected++;
                        if (songsCollected === SONGS.length) {
                            displayJuggernauntFan();
                        }
                    }
                }
                
                // Check for milestones and combo (every 25 apples)
                if (applesEaten % 25 === 0 && applesEaten > 0) {
                    if (MILESTONE_IMAGES[applesEaten]) {
                        triggerMilestone(applesEaten);
                    }
                    triggerCombo(applesEaten);
                }
                
                // Always update UI
                updateScore();
                applesEatenThisRound++;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function triggerCombo(comboNumber) {
            const comboDiv = document.getElementById('comboText');
            comboDiv.textContent = `Combo ${comboNumber}`;
            comboDiv.classList.add('active');
            
            setTimeout(() => {
                comboDiv.classList.remove('active');
            }, 4000);
        }

        function displayJuggernauntFan() {
            const overlay = document.getElementById('fanOverlay');
            // Show fullscreen semi-transparent overlay with message
            overlay.classList.add('active');
            // hide again after animation
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 4000);
        }

        function triggerMilestone(milestoneApples) {
            const imgUrl = MILESTONE_IMAGES[milestoneApples];
            if (!imgUrl) return;
            
            const overlay = document.getElementById('milestoneOverlay');
            const img = document.getElementById('milestoneImage');
            img.src = imgUrl;
            overlay.classList.add('active');
            
            // Remove animation class after 4 seconds
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 4000);
        }

        function playSong(songIndex) {
            const song = SONGS[songIndex];
            // pause menu music when a song starts
            document.getElementById('bgmMenu').pause();
            audioSource.src = song.songUrl;
            songName.textContent = song.songName;
            songCover.src = song.coverUrl;
            songInfo.classList.add('active');
            bgm.load();
            // if a startTime is specified, set it once metadata is available
            if (song.startTime && !isNaN(song.startTime)) {
                bgm.addEventListener('loadedmetadata', function setStart() {
                    bgm.currentTime = song.startTime;
                    bgm.removeEventListener('loadedmetadata', setStart);
                });
            }
            bgm.play().catch(e => console.log('Autoplay prevented:', e));
            // when background music ends, resume menu
            bgm.onended = () => {
                if (!gameRunning) return;
                document.getElementById('bgmMenu').play().catch(e => console.log('Menu resume prevented:', e));
            };
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('applesEaten').textContent = applesEaten;
            document.getElementById('songsCollected').textContent = songsCollected;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (optional)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake with fallback
            snake.forEach((segment, index) => {
                if (snakeImg.complete && snakeImg.naturalWidth > 0) {
                    ctx.drawImage(snakeImg, segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                } else {
                    ctx.fillStyle = index === 0 ? '#4CAF50' : '#45a049';
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                }
            });

            // Draw food (apple with song cover)
            if (foodImages[food.songIndex] && foodImages[food.songIndex].complete && foodImages[food.songIndex].naturalWidth > 0) {
                ctx.drawImage(foodImages[food.songIndex], food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            } else {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            bgm.pause();
            document.getElementById('bgmMenu').play().catch(e => console.log('Menu music autoplay prevented:', e));
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'Start Game';
            let message = `Game Over! Final Score: ${score}\nApples Eaten: ${applesEaten}\nSongs Collected: ${songsCollected}`;
            if (songsCollected === SONGS.length) {
                message += '\nYou have collected all the songs!';
                // include the former fan overlay text below the congratulations
                message += '\nYou are a real Juggernaut fan!';
                message += '\n你赢了，你的剑圣吃品味小众且独特';
                message += '\nあなたの勝ちだ。あなたのJuggernautへの愛はニッチで独占的だ。';
            }
            alert(message);
            // no overlay call on game over any more
        }

        // Initial draw
        draw();
        
        // Play menu music when DOM is ready (ensures it starts as soon as user enters)
        // attempt to play menu music immediately (muted to bypass autoplay)
        {
            const menuAudio = document.getElementById('bgmMenu');
            const tryPlay = () => {
                menuAudio.muted = true;  // play muted first to satisfy autoplay policies
                menuAudio.play()
                    .then(() => { menuAudio.muted = false; })
                    .catch(e => console.log('Menu music autoplay prevented:', e));
            };
            tryPlay();
            const startOnInteraction = () => {
                tryPlay();
                document.removeEventListener('click', startOnInteraction);
                document.removeEventListener('keydown', startOnInteraction);
            };
            document.addEventListener('click', startOnInteraction);
            document.addEventListener('keydown', startOnInteraction);
        }
    </script>
</body>
