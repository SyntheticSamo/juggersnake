<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juggernake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('YOUR_IMAGE_URL_HERE') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .info-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 5px;
        }

        canvas {
            border: 3px solid white;
            background-color: #1a1a1a;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .controls {
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .song-info {
            background: rgba(0,0,0,0.3);
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .song-info.active {
            display: block;
        }

        .song-cover {
            max-width: 150px;
            height: auto;
            border-radius: 5px;
            margin: 10px 0;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Juggernake 🎵</h1>
        
        <div class="game-info">
            <div class="info-item">Score: <span id="score">0</span></div>
            <div class="info-item">Songs Eaten: <span id="songsEaten">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="startBtn" onclick="startGame()">Start Game</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>Pause</button>
            <p style="margin-top: 10px; font-size: 14px;">Use Arrow Keys to move</p>
        </div>

        <div class="song-info" id="songInfo">
            <p>Now Playing:</p>
            <p id="songName"></p>
            <img id="songCover" class="song-cover" alt="Song Cover">
            <audio id="bgm" controls>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // ============================================
        // CUSTOMIZATION SECTION - CHANGE IMAGES HERE
        // ============================================

        // SNAKE IMAGE - Change this to your snake image URL
        const SNAKE_IMAGE_URL = 'https://ibb.co/9X4WPD7';
        
        // APPLE/FOOD IMAGES AND SONGS - Add your songs here!
        // Format: { coverUrl: 'image_url', songUrl: 'audio_url', songName: 'Song Name' }
        const SONGS = [
            {
                coverUrl: 'https://ibb.co/pj3xdrzX',
                songUrl: 'https://music.163.com/song?id=2730282462',
                songName: 'Lily'
            },
            {
                coverUrl: 'https://ibb.co/Txcp08rj',
                songUrl: 'https://music.163.com/song?id=2703896449',
                songName: 'Nova'
            },
            {
                coverUrl: 'https://ibb.co/Txcp08rj',
                songUrl: 'https://music.163.com/song?id=2703896446',
                songName: 'Once again'
            },
            {
                coverUrl: 'https://ibb.co/Txcp08rj',
                songUrl: 'https://music.163.com/song?id=2703896452',
                songName: 'Radiance'
            }
        ];

        // ============================================
        // END OF CUSTOMIZATION SECTION
        // ============================================

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Game variables
        let snake = [{ x: 5, y: 5 }];
        let food = { x: 10, y: 10, songIndex: 0 };
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let songsEaten = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;
        let snakeImg = new Image();
        let foodImages = [];

        // Load images
        snakeImg.src = SNAKE_IMAGE_URL;

        // Load song cover images
        SONGS.forEach((song, index) => {
            let img = new Image();
            img.src = song.coverUrl;
            foodImages[index] = img;
        });

        // Audio setup
        const bgm = document.getElementById('bgm');
        const audioSource = document.getElementById('audioSource');
        const songInfo = document.getElementById('songInfo');
        const songName = document.getElementById('songName');
        const songCover = document.getElementById('songCover');

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { nextDx = 0; nextDy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { nextDx = 1; nextDy = 0; }
                    break;
            }
        });

        function startGame() {
            if (gameRunning && !gamePaused) return;
            
            if (!gameRunning) {
                shuffleSongs();
                snake = [{ x: 5, y: 5 }];
                dx = 1;
                dy = 0;
                nextDx = 1;
                nextDy = 0;
                score = 0;
                songsEaten = 0;
                updateScore();
                generateFood();
            }

            gameRunning = true;
            gamePaused = false;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = 'Pause';

            clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }

        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';

            if (gamePaused) {
                clearInterval(gameLoop);
                bgm.pause();
            } else {
                gameLoop = setInterval(update, 100);
                bgm.play();
            }
        }

        // Shuffled song list for this game
        let songSequence = [];
        let currentSongIndex = 0;

        function shuffleSongs() {
            songSequence = [...SONGS].sort(() => Math.random() - 0.5);
            currentSongIndex = 0;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Get next song from shuffled sequence
            food.songIndex = SONGS.indexOf(songSequence[currentSongIndex]);
            
            // Move to next song, and restart sequence if we've eaten all songs
            currentSongIndex++;
            if (currentSongIndex >= songSequence.length) {
                shuffleSongs(); // Reshuffle and loop infinitely
            }

            // Ensure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    break;
                }
            }
        }

        function update() {
            // Update snake direction
            dx = nextDx;
            dy = nextDy;

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                songsEaten++;
                updateScore();
                playSong(food.songIndex);
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function playSong(songIndex) {
            const song = SONGS[songIndex];
            audioSource.src = song.songUrl;
            songName.textContent = song.songName;
            songCover.src = song.coverUrl;
            songInfo.classList.add('active');
            bgm.load();
            bgm.play().catch(e => console.log('Autoplay prevented:', e));
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('songsEaten').textContent = songsEaten;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (optional)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (snakeImg.complete) {
                    ctx.drawImage(snakeImg, segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                } else {
                    // Fallback color if image not loaded
                    ctx.fillStyle = index === 0 ? '#4CAF50' : '#45a049';
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                }
            });

            // Draw food (apple with song cover)
            if (foodImages[food.songIndex].complete) {
                ctx.drawImage(foodImages[food.songIndex], food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            } else {
                // Fallback color if image not loaded
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            bgm.pause();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'Start Game';
            alert(`Game Over! Final Score: ${score}\nSongs Eaten: ${songsEaten}`);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
