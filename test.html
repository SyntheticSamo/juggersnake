
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景音乐网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">欢迎来到我的网站！</h1>
        <p class="text-lg text-gray-600 mb-8">享受美妙的背景音乐。</p>

        <!-- 背景音乐 -->
        <audio autoplay loop controls class="w-full max-w-md mx-auto">
            <source src="https://image2url.com/r2/default/audio/1772577178179-629b2bf5-2280-4792-86d8-8f742615fe9d.mp3" type="audio/mpeg">
            <source src="https://image2url.com/r2/default/audio/1772577178179-629b2bf5-2280-4792-86d8-8f742615fe9d.mp3" type="audio/ogg">
            Your browser does not support the audio element.
        </audio>

        <p class="text-sm text-gray-500 mt-4">请将 "your-music-file.mp3" 和 "your-music-file.ogg" 替换为你的音乐文件路径。</p>
    </div>
